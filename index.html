  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:   #080808;
      --border:  #222;
      --gold:    #b8903a;
      --gold-lt: #d4aa5a;
      --white:   #f4f0ea;
      --muted:   #777;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px 40px;
      gap: 0;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: -1;
      background: radial-gradient(ellipse 55% 45% at 50% 38%, rgba(184,144,58,0.07) 0%, transparent 68%);
      pointer-events: none;
    }

    /* LOGO */
    .logo-img {
      width: min(220px, 60vw);
      display: block;
      margin: 0 auto 32px;
      filter: drop-shadow(0 0 36px rgba(184,144,58,0.18));
    }

    /* HEADLINE */
    .headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.75rem, 5vw, 3rem);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.01em;
      margin-bottom: 12px;
      max-width: 520px;
    }
    .headline em {
      font-style: italic;
      color: var(--gold-lt);
    }

    /* SUBLINE */
    .subline {
      font-size: clamp(0.88rem, 2vw, 1rem);
      color: var(--muted);
      font-weight: 300;
      margin-bottom: 36px;
      max-width: 360px;
      line-height: 1.6;
    }

    /* CTA */
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: var(--gold);
      color: #080808;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 18px 40px;
      border-radius: 3px;
      box-shadow: 0 4px 28px rgba(184,144,58,0.28);
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      margin-bottom: 20px;
    }
    .cta-btn:hover {
      background: var(--gold-lt);
      transform: translateY(-2px);
      box-shadow: 0 8px 36px rgba(184,144,58,0.38);
    }
    .cta-btn svg {
      width: 16px; height: 16px;
      fill: currentColor;
      flex-shrink: 0;
    }

    /* TRUST */
    .trust {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 40px;
    }
    .stars { color: var(--gold); letter-spacing: 1px; font-size: 0.78rem; }
    .trust strong { color: var(--white); font-weight: 500; }

    /* DIVIDER */
    .divider {
      width: 40px; height: 1px;
      background: var(--border);
      margin: 0 auto 32px;
    }

    /* INFO */
    .info-row {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 36px;
    }
    .info-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.03em;
    }
    .info-item strong { color: var(--white); font-weight: 500; }
    .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }

    .phone-link {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .phone-link:hover { color: var(--gold-lt); }

    /* INSTAGRAM BTN */
    .ig-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.76rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 40px;
      transition: color 0.2s, border-color 0.2s;
    }
    .ig-btn:hover {
      color: var(--white);
      border-color: #555;
    }
    .ig-btn svg {
      width: 14px; height: 14px;
      fill: currentColor;
      flex-shrink: 0;
    }

    @media (max-width: 420px) {
      .cta-btn { width: 100%; justify-content: center; }
      .info-row { gap: 16px; }
    }
    @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
  </style>
</head>
